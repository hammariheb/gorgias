version: 2

sources:
  - name: leads
    database: gorgias-case-study-491317
    schema: leads
    description: "Raw leads data ingested from source system"

    tables:
      - name: leads_raw
        description: "This is the leads table"

        columns:
          - name: domain
            description: "Company domain name"
            tests:
              - not_null
              - unique:
                  severity: warn
        

          - name: ecommerce_platform
            description: "E-commerce platform used by the lead"

          - name: helpdesk
            description: "Helpdesk tool used"

          - name: technologies_app_partners
            description: "List of partner technologies"

          - name: estimated_gmv_band
            description: "Estimated GMV range bucket"

  - name: reviews
    database: gorgias-case-study-491317
    schema: reviews
    description: "Raw reviews data ingested from source system"

    tables:
      - name: reviews_raw
        description: "This is the reviews table"

        columns:
          - name: domain
            description: "Company domain name"
            tests:
              - not_null

          - name: review_id
            description: "Unique identifier for each review"
            tests:
              - unique:
                  severity: error
              - not_null

          - name: review_text
            description: "Text content of the review"

          - name: review_title
            description: "Title of the review"

          - name: star_rating
            description: "Star rating given in the review (e.g., 1-5)"
         
          - name: date_published
            description: "Date when the review was published"

          - name: reviewer_name
            description: "Name of the reviewer"

          - name: company_replied
            description: "Indicates if the company replied to the review"

          - name: language
            description: "Language of the review"

          - name: ingested_at
            description: "Timestamp when the review was ingested into the database"
            tests:
              - not_null

      - name: reviews_enriched
        description: "Enriched reviews data with additional transformations"

        columns:
          - name: review_id
            description: "Unique identifier for each review"
            tests:
              - not_null
              - unique

          - name: domain
            description: "Company domain name"
          - name: sentiment
            description: "Sentiment analysis result for the review (e.g., positive, negative,
              neutral)"
          - name: category
            description: "Categorization of the review based on content (e.g., product quality,
              customer service)"
          - name: pain_point
            description: "Identified pain point mentioned in the review"
          - name: actionable_insight
            description: "Actionable insight derived from the review"
          - name: model_used
            description: "AI model used for enrichment"
          - name: enriched_at
            description: "Timestamp when the review was enriched"